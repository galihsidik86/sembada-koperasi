<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--bg)}
  .row{display:flex;gap:18px;align-items:center}
  .box{background:var(--surface);border:1px solid var(--border);width:84px;height:84px;display:flex;align-items:center;justify-content:center;font:700 13px var(--font-sans);color:var(--fg1)}
  .meta{font:500 10px var(--font-mono);color:var(--fg3);text-align:center;margin-top:6px}
</style></head>
<body>
<div class="row">
  <div><div class="box" style="border-radius:4px">xs</div><div class="meta">4px</div></div>
  <div><div class="box" style="border-radius:8px">sm</div><div class="meta">8px</div></div>
  <div><div class="box" style="border-radius:12px">md</div><div class="meta">12px</div></div>
  <div><div class="box" style="border-radius:16px">lg</div><div class="meta">16px</div></div>
  <div><div class="box" style="border-radius:24px">xl</div><div class="meta">24px</div></div>
  <div><div class="box" style="border-radius:32px">2xl</div><div class="meta">32px</div></div>
  <div><div class="box" style="border-radius:9999px">full</div><div class="meta">9999</div></div>
</div>
</body></html>
