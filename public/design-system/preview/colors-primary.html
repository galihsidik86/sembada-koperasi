<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--bg)}
  .grid{display:grid;grid-template-columns:repeat(6,1fr);gap:12px}
  .swatch{aspect-ratio:1;border-radius:var(--r-md);display:flex;align-items:flex-end;padding:8px;font:600 11px var(--font-sans);box-shadow:var(--shadow-xs)}
  .label{display:flex;justify-content:space-between;width:100%}
  .label span:last-child{opacity:.7;font-weight:500}
</style></head>
<body>
<div class="grid">
  <div class="swatch" style="background:#FBF2EE;color:#5C3A1E"><div class="label"><span>50</span><span>FBF2EE</span></div></div>
  <div class="swatch" style="background:#F4DDD3;color:#5C3A1E"><div class="label"><span>100</span><span>F4DDD3</span></div></div>
  <div class="swatch" style="background:#E5B4A4;color:#5C3A1E"><div class="label"><span>200</span><span>E5B4A4</span></div></div>
  <div class="swatch" style="background:#D08672;color:#FFF"><div class="label"><span>300</span><span>D08672</span></div></div>
  <div class="swatch" style="background:#B85A48;color:#FFF"><div class="label"><span>400</span><span>B85A48</span></div></div>
  <div class="swatch" style="background:#8B2E2E;color:#F5F1E8"><div class="label"><span>500★</span><span>8B2E2E</span></div></div>
</div>
<div style="margin-top:14px;font:600 12px/1.4 var(--font-sans);color:var(--fg2);letter-spacing:.04em;text-transform:uppercase">Sogan — Primary</div>
</body></html>
