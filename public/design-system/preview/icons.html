<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--bg);color:var(--sogan-500)}
  .row{display:flex;gap:18px;align-items:center;flex-wrap:wrap}
  .group{display:flex;flex-direction:column;align-items:center;gap:6px}
  .icon-bg{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);width:64px;height:64px;display:flex;align-items:center;justify-content:center}
  .icon-bg img{width:32px;height:32px}
  .lbl{font:600 11px var(--font-sans);color:var(--fg2)}
</style></head>
<body>
<div class="row">
  <div class="group"><div class="icon-bg"><img src="../assets/icons/simpanan.svg"></div><div class="lbl">simpanan</div></div>
  <div class="group"><div class="icon-bg"><img src="../assets/icons/shu.svg"></div><div class="lbl">shu</div></div>
  <div class="group"><div class="icon-bg"><img src="../assets/icons/gotong-royong.svg"></div><div class="lbl">gotong-royong</div></div>
  <div class="group"><div class="icon-bg"><img src="../assets/icons/kartu-anggota.svg"></div><div class="lbl">kartu-anggota</div></div>
  <div class="group" style="margin-left:8px;border-left:1px solid var(--border);padding-left:18px">
    <div class="icon-bg"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div>
    <div class="lbl">lucide:home</div>
  </div>
  <div class="group">
    <div class="icon-bg"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg></div>
    <div class="lbl">lucide:credit-card</div>
  </div>
</div>
</body></html>
