<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--bg)}
  .row{display:flex;align-items:flex-end;gap:12px}
  .blk{background:var(--sogan-500);border-radius:var(--r-xs)}
  .col{display:flex;flex-direction:column;align-items:center;gap:6px;font:500 10px var(--font-mono);color:var(--fg2)}
  .name{font:700 10px var(--font-sans);color:var(--fg1)}
</style></head>
<body>
<div class="row">
  <div class="col"><div class="blk" style="width:4px;height:4px"></div><div class="name">s-1</div><div>4</div></div>
  <div class="col"><div class="blk" style="width:8px;height:8px"></div><div class="name">s-2</div><div>8</div></div>
  <div class="col"><div class="blk" style="width:12px;height:12px"></div><div class="name">s-3</div><div>12</div></div>
  <div class="col"><div class="blk" style="width:16px;height:16px"></div><div class="name">s-4</div><div>16</div></div>
  <div class="col"><div class="blk" style="width:20px;height:20px"></div><div class="name">s-5</div><div>20</div></div>
  <div class="col"><div class="blk" style="width:24px;height:24px"></div><div class="name">s-6</div><div>24</div></div>
  <div class="col"><div class="blk" style="width:32px;height:32px"></div><div class="name">s-8</div><div>32</div></div>
  <div class="col"><div class="blk" style="width:40px;height:40px"></div><div class="name">s-10</div><div>40</div></div>
  <div class="col"><div class="blk" style="width:56px;height:56px"></div><div class="name">s-14</div><div>56</div></div>
  <div class="col"><div class="blk" style="width:72px;height:72px"></div><div class="name">s-18</div><div>72</div></div>
</div>
</body></html>
