<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--bg)}
  .grid{display:grid;grid-template-columns:repeat(6,1fr);gap:12px}
  .swatch{aspect-ratio:1;border-radius:var(--r-md);display:flex;align-items:flex-end;padding:8px;font:600 11px var(--font-sans);box-shadow:var(--shadow-xs);border:1px solid var(--border)}
  .label{display:flex;justify-content:space-between;width:100%}
  .label span:last-child{opacity:.7;font-weight:500}
</style></head>
<body>
<div class="grid">
  <div class="swatch" style="background:#FBF9F4;color:#5C3A1E"><div class="label"><span>50</span><span>FBF9F4</span></div></div>
  <div class="swatch" style="background:#F5F1E8;color:#5C3A1E"><div class="label"><span>100★</span><span>F5F1E8</span></div></div>
  <div class="swatch" style="background:#ECE5D8;color:#5C3A1E"><div class="label"><span>200</span><span>ECE5D8</span></div></div>
  <div class="swatch" style="background:#E5DDD0;color:#5C3A1E"><div class="label"><span>300</span><span>E5DDD0</span></div></div>
  <div class="swatch" style="background:#D6C9B3;color:#5C3A1E"><div class="label"><span>400</span><span>D6C9B3</span></div></div>
  <div class="swatch" style="background:#BFAE94;color:#FFF"><div class="label"><span>500</span><span>BFAE94</span></div></div>
</div>
<div style="margin-top:14px;font:600 12px/1.4 var(--font-sans);color:var(--fg2);letter-spacing:.04em;text-transform:uppercase">Cream / Gading — Surface</div>
</body></html>
